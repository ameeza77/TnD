<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T&D Learning Journey</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .header { width: 100%; background: linear-gradient(135deg, #1a2e4a, #2a4570); text-align: center; padding: 1.2rem 1rem; border-bottom: 3px solid #f0a500; }
  .header h1 { font-size: clamp(1.2rem, 3vw, 2rem); color: #fff; font-weight: 700; }
  .header h1 span { color: #f0a500; }
  .header p { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-top: 0.3rem; }
  .map-wrapper { width: 100%; max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; }
  .map-container { position: relative; width: 100%; }
  .map-container img { width: 100%; height: auto; display: block; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

  .hotspot {
    position: absolute;
    border: 3px solid rgba(255,255,255,0.9);
    border-radius: 50%;
    width: 4%;
    aspect-ratio: 1;
    cursor: pointer;
    z-index: 10;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: clamp(0.55rem, 1.2vw, 0.95rem);
    color: #fff;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: glow 2s infinite;
  }
  .hotspot:hover { transform: translate(-50%, -50%) scale(1.25); animation: none; box-shadow: 0 0 0 5px rgba(255,255,255,0.4); }
  .phase1 { background: rgba(37,99,168,0.92); }
  .phase2 { background: rgba(217,119,6,0.92); }
  .phase3 { background: rgba(45,138,78,0.92); }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.5), 0 2px 8px rgba(0,0,0,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(255,255,255,0), 0 2px 8px rgba(0,0,0,0.3); }
  }

  /* Hotspot positions — fine-tuned */
  #hs1 { left: 9%;  top: 22%; }
  #hs2 { left: 27%; top: 43%; }
  #hs3 { left: 60%; top: 38%; }
  #hs4 { left: 13%; top: 65%; }
  #hs5 { left: 53%; top: 63%; }
  #hs6 { left: 13%; top: 85%; }
  #hs7 { left: 60%; top: 85%; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,20,40,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 20px; width: 100%; max-width: 660px; max-height: 88vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,0.4); animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes modalIn { from { opacity:0; transform:scale(0.88) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .modal-header { padding: 1.4rem 1.4rem 1rem; border-bottom: 1px solid #f0ebe0; position: relative; display: flex; gap: 1rem; align-items: flex-start; }
  .modal-header::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:var(--rc,#2563a8); border-radius:20px 20px 0 0; }
  .modal-icon { font-size: 2rem; flex-shrink: 0; margin-top: 0.2rem; }
  .modal-title-wrap h2 { font-size: 1.05rem; font-weight: 700; color: #1a2e4a; line-height: 1.2; }
  .modal-title-wrap .sub { font-size: 0.78rem; color: #6b7280; margin-top: 0.2rem; }
  .modal-phase { display:inline-block; font-size:0.65rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; padding:0.2rem 0.6rem; border-radius:8px; margin-top:0.4rem; background:var(--rcl,#e8f0fb); color:var(--rc,#2563a8); }
  .modal-close { position:absolute; top:1rem; right:1rem; background:#f3f4f6; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:0.9rem; color:#6b7280; display:flex; align-items:center; justify-content:center; }
  .modal-close:hover { background: #e5e7eb; }
  .modal-body { padding: 1.4rem; }
  .video-box { width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden; background:#1a2e4a; margin-bottom:1.2rem; display:flex; align-items:center; justify-content:center; }
  .video-box iframe { width:100%; height:100%; border:none; }
  .video-placeholder { text-align:center; color:rgba(255,255,255,0.4); font-size:0.82rem; }
  .video-placeholder div { font-size:2rem; margin-bottom:0.4rem; }
  .info-section { margin-bottom: 1.1rem; }
  .info-section h4 { font-size:0.68rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--rc,#2563a8); margin-bottom:0.55rem; }
  .info-list { list-style: none; }
  .info-list li { font-size:0.84rem; color:#374151; line-height:1.5; padding:0.3rem 0 0.3rem 1.1rem; position:relative; border-bottom:1px solid #f9f9f9; }
  .info-list li::before { content:'▸'; position:absolute; left:0; color:var(--rc,#2563a8); font-size:0.7rem; top:0.38rem; }
  .kp-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-top:0.4rem; }
  .kp-card { background:#f8f9fa; border-radius:10px; padding:0.7rem; border-left:3px solid var(--rc,#2563a8); }
  .kp-level { font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--rc,#2563a8); }
  .kp-title { font-size:0.8rem; font-weight:600; color:#1a2e4a; margin-top:0.1rem; }
  .kp-desc { font-size:0.7rem; color:#6b7280; margin-top:0.2rem; line-height:1.3; }
  .factor-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-top:0.4rem; }
  .factor-chip { background:#f8f9fa; border-radius:10px; padding:0.6rem 0.8rem; display:flex; align-items:center; gap:0.5rem; font-size:0.82rem; font-weight:500; color:#1a2e4a; border-left:3px solid var(--rc,#2563a8); }
  .footer { width:100%; text-align:center; padding:1rem; font-size:0.72rem; color:rgba(255,255,255,0.3); margin-top:auto; }
  .footer span { color: #f0a500; }
  @media (max-width:500px) {
    .kp-grid, .factor-grid { grid-template-columns: 1fr; }
    .modal { border-radius: 16px 16px 0 0; }
    .modal-overlay { align-items: flex-end; padding: 0; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>T&D <span>Learning</span> Journey</h1>
  <p>Click on any station to explore · A Continuous Cycle for Performance Improvement</p>
</div>
<div class="map-wrapper">
  <div class="map-container">
    <img src="map.jpg" alt="T&D Learning Journey Map">
    <button class="hotspot phase1" id="hs1" onclick="openModal('s1')">1</button>
    <button class="hotspot phase1" id="hs2" onclick="openModal('s2')">2</button>
    <button class="hotspot phase1" id="hs3" onclick="openModal('s3')">3</button>
    <button class="hotspot phase2" id="hs4" onclick="openModal('s4')">4</button>
    <button class="hotspot phase2" id="hs5" onclick="openModal('s5')">5</button>
    <button class="hotspot phase3" id="hs6" onclick="openModal('s6')">6</button>
    <button class="hotspot phase3" id="hs7" onclick="openModal('s7')">7</button>
  </div>
</div>
<div class="footer"><span>Training & Development</span> · Interactive Learning Map · Saito University College</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header" id="mHeader">
      <div class="modal-icon" id="mIcon">🏢</div>
      <div class="modal-title-wrap">
        <h2 id="mTitle"></h2>
        <div class="sub" id="mSub"></div>
        <span class="modal-phase" id="mPhase"></span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
const stations = {
  s1:{icon:'🚪',title:'Entrance',sub:'Introduction to Training & Development',phase:'Station 1 · Phase 1 — Before Training',color:'#2563a8',colorLight:'#e8f0fb',video:null,
    body:`<div class="info-section"><h4>What is Training & Development?</h4><ul class="info-list"><li>T&D refers to systematic activities to improve employee knowledge, skills & attitudes</li><li>A planned process within Human Resource Management (HRM)</li><li>Helps employees perform current jobs better & prepares them for future roles</li></ul></div><div class="info-section"><h4>Why It Matters in Organizations</h4><ul class="info-list"><li>Improves individual and organizational performance</li><li>Reduces errors, accidents, and employee turnover</li><li>Increases motivation, engagement, and job satisfaction</li><li>Helps organizations stay competitive and adapt to change</li></ul></div>`},
  s2:{icon:'📋',title:'Reception Area',sub:'Importance of Prioritising Training Needs',phase:'Station 2 · Phase 1 — Before Training',color:'#2563a8',colorLight:'#e8f0fb',video:null,
    body:`<div class="info-section"><h4>Why Prioritise Training Needs?</h4><ul class="info-list"><li>Organizations face <strong>limited budget & time</strong> — not all training can run at once</li><li>Many competing training needs exist across departments</li><li>Prioritisation ensures resources go to the most impactful training first</li></ul></div><div class="info-section"><h4>How to Prioritise</h4><ul class="info-list"><li>Align training with organizational goals and strategy</li><li>Conduct Training Needs Analysis (TNA) to identify gaps</li><li>Rank needs based on urgency, impact, and feasibility</li><li>Involve managers and stakeholders in the decision process</li></ul></div>`},
  s3:{icon:'👔',title:'Manager Decision Area',sub:'Factors in Training Prioritisation',phase:'Station 3 · Phase 1 — Before Training',color:'#2563a8',colorLight:'#e8f0fb',video:null,
    body:`<div class="info-section"><h4>Key Factors to Consider</h4><div class="factor-grid"><div class="factor-chip">🎯 Relevance</div><div class="factor-chip">💰 Cost</div><div class="factor-chip">⏱️ Time</div><div class="factor-chip">👥 Resources</div></div></div><div class="info-section"><h4>Prioritisation Checklist</h4><ul class="info-list"><li><strong>Relevance</strong> — Does this training address a real performance gap?</li><li><strong>Cost</strong> — Is the training cost-effective relative to its benefit?</li><li><strong>Time</strong> — Can it be delivered within the required timeframe?</li><li><strong>Resources</strong> — Are trainers, materials, and facilities available?</li></ul></div>`},
  s4:{icon:'🎓',title:'Training Room',sub:'Training Implementation',phase:'Station 4 · Phase 2 — During Training',color:'#d97706',colorLight:'#fef3e2',video:null,
    body:`<div class="info-section"><h4>During the Training Session</h4><ul class="info-list"><li>Conduct training using appropriate methods — classroom, on-the-job, e-learning</li><li>Monitor <strong>attendance & participation</strong> to ensure engagement</li><li>Facilitate learning activities — discussions, role-plays, simulations</li></ul></div><div class="info-section"><h4>Trainer's Role</h4><ul class="info-list"><li>Create a positive, inclusive learning environment</li><li>Use varied instructional strategies for different learners</li><li>Provide immediate feedback and support during activities</li><li>Keep sessions on schedule while remaining flexible</li></ul></div>`},
  s5:{icon:'📊',title:'Evaluation Area',sub:'Training Evaluation — Kirkpatrick Model',phase:'Station 5 · Phase 2 — During Training',color:'#d97706',colorLight:'#fef3e2',video:null,
    body:`<div class="info-section"><h4>Evaluation Activities</h4><ul class="info-list"><li>Collect feedback from participants immediately after training</li><li>Assess understanding through tests, quizzes, or demonstrations</li><li>Measure effectiveness against training objectives</li></ul></div><div class="info-section"><h4>Kirkpatrick Evaluation Model</h4><div class="kp-grid"><div class="kp-card"><div class="kp-level">Level 1</div><div class="kp-title">Reaction</div><div class="kp-desc">How participants feel about the training</div></div><div class="kp-card"><div class="kp-level">Level 2</div><div class="kp-title">Learning</div><div class="kp-desc">What knowledge or skills they learned</div></div><div class="kp-card"><div class="kp-level">Level 3</div><div class="kp-title">Behaviour</div><div class="kp-desc">Whether they apply learning at work</div></div><div class="kp-card"><div class="kp-level">Level 4</div><div class="kp-title">Results</div><div class="kp-desc">Impact on performance & organization</div></div></div></div>`},
  s6:{icon:'🏢',title:'Workplace Area',sub:'Transfer of Training',phase:'Station 6 · Phase 3 — After Training',color:'#2d8a4e',colorLight:'#e6f4ec',video:null,
    body:`<div class="info-section"><h4>Applying Skills at Work</h4><ul class="info-list"><li>Employees apply newly learned skills in their actual job roles</li><li><strong>Supervisor support</strong> is critical — managers must encourage application</li><li>Positive <strong>work environment</strong> enables transfer of learning</li><li>Follow-up & reinforcement — coaching, feedback, and practice opportunities</li></ul></div><div class="info-section"><h4>Real-World Example (ZUS Coffee)</h4><ul class="info-list"><li>Barista trained on customer service now applies it daily with customers</li><li>Supervisor observes and provides constructive feedback</li><li>Regular check-ins ensure skills are maintained over time</li></ul></div>`},
  s7:{icon:'📈',title:'Results / ROI Area',sub:'Training Outcomes & Return on Investment',phase:'Station 7 · Phase 3 — After Training',color:'#2d8a4e',colorLight:'#e6f4ec',video:null,
    body:`<div class="info-section"><h4>Outcomes Achieved</h4><ul class="info-list"><li>✅ Better Performance — employees perform tasks more effectively</li><li>✅ Higher Productivity — output increases with improved skills</li><li>✅ Cost Savings — fewer errors, less waste, reduced turnover</li><li>✅ Customer Satisfaction — better service quality from trained staff</li><li>✅ Business Growth — skilled workforce drives organizational success</li></ul></div><div class="info-section"><h4>Measuring ROI</h4><ul class="info-list"><li>Compare KPIs before and after training</li><li>Measure output per employee (productivity)</li><li>Calculate reduction in errors or rework (cost savings)</li><li>Link training outcomes to strategic goals achieved</li></ul></div>`}
};

function openModal(key) {
  const r = stations[key];
  const box = document.getElementById('modalBox');
  const hdr = document.getElementById('mHeader');
  document.getElementById('mIcon').textContent = r.icon;
  document.getElementById('mTitle').textContent = r.title;
  document.getElementById('mSub').textContent = r.sub;
  const ph = document.getElementById('mPhase');
  ph.textContent = r.phase;
  ph.style.background = r.colorLight;
  ph.style.color = r.color;
  hdr.style.setProperty('--rc', r.color);
  hdr.style.setProperty('--rcl', r.colorLight);
  box.style.setProperty('--rc', r.color);
  box.style.setProperty('--rcl', r.colorLight);
  const vid = r.video
    ? `<div class="video-box"><iframe src="https://www.youtube.com/embed/${r.video}" allowfullscreen></iframe></div>`
    : `<div class="video-box"><div class="video-placeholder"><div>▶️</div>Video coming soon</div></div>`;
  document.getElementById('mBody').innerHTML = vid + r.body;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); document.body.style.overflow=''; }
function closeOnOverlay(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
