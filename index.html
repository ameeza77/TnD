<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T&D Learning Journey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;font-family:"Segoe UI",Arial,sans-serif;}
.map-wrap{position:relative;display:inline-block;width:100%;max-width:900px;}
.map-wrap img{display:block;width:100%;height:auto;}
.sign-hotspot{position:absolute;border-radius:6px;cursor:pointer;background:transparent;}
.sign-hotspot:hover{background:rgba(255,255,255,0.07);}

/* PROGRESS BAR */
.progress-wrap{
  position:fixed;top:0;left:0;right:0;
  background:rgba(0,0,0,0.85);
  padding:8px 14px;
  z-index:50;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:2px solid #c8a000;
}
.progress-label{
  color:#FFD700;
  font-size:10px;
  font-weight:700;
  white-space:nowrap;
  letter-spacing:0.05em;
}
.progress-bar-bg{
  flex:1;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  height:8px;
  overflow:hidden;
}
.progress-bar-fill{
  height:100%;
  border-radius:20px;
  background:linear-gradient(90deg,#c8a000,#FFD700);
  transition:width 0.5s ease;
  width:0%;
}
.progress-dots{
  display:flex;
  gap:4px;
}
.pdot{
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  border:1.5px solid rgba(255,255,255,0.3);
  transition:all 0.3s;
}
.pdot.done{
  background:#2ecc71;
  border-color:#2ecc71;
}

/* PROGRESS BAR */
.progress-wrap{
  width:100%;
  max-width:900px;
  background:#111;
  padding:8px 12px;
  display:flex;
  align-items:center;
  gap:10px;
}
.progress-label{
  color:#FFD700;
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
  flex-shrink:0;
}
.progress-bar-bg{
  flex:1;
  height:8px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}
.progress-bar-fill{
  height:100%;
  border-radius:10px;
  background:linear-gradient(90deg,#FFD700,#FFA500);
  transition:width 0.5s ease;
  width:0%;
}
.progress-count{
  color:rgba(255,255,255,0.5);
  font-size:11px;
  white-space:nowrap;
  flex-shrink:0;
}
@keyframes quizpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

.vid-overlay{display:none;position:fixed;inset:0;background:#000;z-index:100;flex-direction:column;}
.vid-overlay.show{display:flex;}
.yt-frame{flex:1;width:100%;border:none;}
.vid-footer{background:#111;padding:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-gold{background:#FFD700;border:none;color:#1a1a2e;font-size:13px;font-weight:800;padding:11px 24px;border-radius:30px;cursor:pointer;}
.btn-outline{background:transparent;border:2px solid #FFD700;color:#FFD700;font-size:13px;font-weight:700;padding:11px 24px;border-radius:30px;cursor:pointer;}
.btn-vid2{background:#e8a020;border:none;color:#fff;font-size:13px;font-weight:800;padding:11px 24px;border-radius:30px;cursor:pointer;}
.station-bar{background:rgba(0,0,0,0.9);padding:10px 16px;border-bottom:3px solid #FFD700;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.stn-badge{background:#FFD700;color:#1a1a2e;font-weight:800;font-size:13px;padding:4px 10px;border-radius:8px;}
.stn-name{color:#fff;font-size:13px;font-weight:600;}
.stn-sub{color:rgba(255,255,255,0.5);font-size:11px;}
.vid-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#0a0a1a;}
.big-icon{font-size:60px;opacity:0.3;}
.vid-placeholder p{color:rgba(255,255,255,0.35);font-size:14px;}

.quiz-overlay{display:none;position:fixed;inset:0;z-index:200;overflow-y:auto;background:linear-gradient(135deg,#0d1b2a,#0a1520);}
.quiz-overlay.show{display:block;}
.quiz-box{max-width:520px;margin:0 auto;padding:20px 20px 40px;}
.quiz-header{text-align:center;padding:24px 0 16px;}
.quiz-icon{font-size:32px;margin-bottom:8px;}
.quiz-header h2{font-size:16px;font-weight:900;color:#90C8FF;}
.quiz-header p{font-size:11px;opacity:0.6;color:#fff;margin-top:4px;}
.q-prog-bar{background:rgba(255,255,255,0.1);border-radius:10px;height:6px;margin:0 0 20px;overflow:hidden;}
.q-prog-fill{height:100%;border-radius:10px;transition:width 0.4s ease;background:linear-gradient(90deg,#4080C0,#90C8FF);}
.question-card{border-radius:16px;padding:18px;margin-bottom:12px;background:rgba(200,230,255,0.05);border:1px solid rgba(100,180,255,0.2);}
.q-num{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;color:#60A0E0;}
.q-text{font-size:14px;line-height:1.6;font-weight:600;margin-bottom:14px;color:#E0F0FF;}
.options{display:flex;flex-direction:column;gap:8px;}
.opt-btn{border-radius:10px;padding:10px 14px;font-size:13px;text-align:left;cursor:pointer;transition:all 0.2s;border:1.5px solid rgba(100,180,255,0.2);background:rgba(100,180,255,0.05);color:rgba(200,230,255,0.85);font-family:"Segoe UI",Arial,sans-serif;}
.opt-btn:hover{background:rgba(64,128,192,0.2);border-color:#60A0E0;}
.opt-btn.correct{background:rgba(50,200,100,0.2)!important;border-color:#50C878!important;color:#90FFB0!important;}
.opt-btn.wrong{background:rgba(255,80,80,0.2)!important;border-color:#FF6060!important;color:#FFB0B0!important;}
.opt-btn:disabled{cursor:default;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.shake{animation:shake 0.4s ease;}
@keyframes bounceA{0%,100%{transform:scale(1);}40%{transform:scale(1.08);}70%{transform:scale(0.96);}}
.bounce{animation:bounceA 0.4s ease;}
.score-screen{display:none;text-align:center;padding:40px 20px;}
.score-screen.show{display:block;}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;border:4px solid #60A0E0;background:rgba(64,128,192,0.15);}
.score-num{font-size:40px;font-weight:900;color:#90C8FF;}
.score-total{font-size:13px;opacity:0.5;color:#fff;}
.score-msg{color:#E0F0FF;font-size:17px;font-weight:800;margin-bottom:8px;}
.score-sub{color:rgba(180,210,255,0.6);font-size:12px;margin-bottom:24px;}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
/* LOADING SCREEN */
#loadingScreen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#0d1b2a,#0a1520);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
  transition:opacity 0.6s ease;
}
#loadingScreen.fade-out{opacity:0;pointer-events:none;}
.load-icon{font-size:56px;animation:loadpulse 1.2s ease-in-out infinite;}
@keyframes loadpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.load-title{color:#FFD700;font-size:18px;font-weight:800;letter-spacing:0.08em;text-align:center;}
.load-sub{color:rgba(255,255,255,0.5);font-size:12px;text-align:center;}
.load-bar-bg{width:220px;height:6px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;}
.load-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#c8a000,#FFD700);animation:loadbar 1.8s ease-in-out infinite;}
@keyframes loadbar{0%{width:0%;}60%{width:85%;}100%{width:100%;}}
.load-dots{display:flex;gap:8px;margin-top:4px;}
.load-dot{width:8px;height:8px;border-radius:50%;background:#FFD700;animation:dotbounce 1.2s ease-in-out infinite;}
.load-dot:nth-child(2){animation-delay:0.2s;}
.load-dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotbounce{0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
</style>

var curStation=0,sqCurrent=0,sqScore=0;
var completedStations = new Set();

// Sound effects using Web Audio API
function playSound(type) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if(type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    } else {
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    }
  } catch(e) {}
}

function playClap() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Play 5 claps
    var claps = [0, 0.18, 0.36, 0.54, 0.72];
    claps.forEach(function(t) {
      var buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
      var data = buf.getChannelData(0);
      for(var i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/data.length, 3);
      }
      var src = ctx.createBufferSource();
      src.buffer = buf;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.6, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.1);
      src.connect(g);
      g.connect(ctx.destination);
      src.start(ctx.currentTime + t);
    });
    // Victory tune after claps
    var notes = [523, 659, 784, 1047];
    notes.forEach(function(freq, idx) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, ctx.currentTime + 1.0 + idx*0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0 + idx*0.15 + 0.2);
      osc.start(ctx.currentTime + 1.0 + idx*0.15);
      osc.stop(ctx.currentTime + 1.0 + idx*0.15 + 0.2);
    });
  } catch(e) {}
}

// Dot 1=TNA(idx5), Dot 2=TNADetails(idx3), Dot 3=TrainingDesign(idx0), Dot 4=Evaluation(idx1), Dot 5=Transfer(idx2), Dot 6=ROI(idx4)
var visualOrder = [5, 3, 0, 1, 2, 4];

function updateProgress(){
  var total = 6;
  var done = completedStations.size;
  var pct = (done/total)*100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressCount').textContent = done+' / '+total+' completed';
  for(var i=0;i<6;i++){
    var d = document.getElementById('pdot'+i);
    if(d){
      if(completedStations.has(visualOrder[i])) d.classList.add('done');
      else d.classList.remove('done');
    }
  }
}

function initProgress(){
  var dots = document.getElementById('progDots');
  dots.innerHTML = '';
  for(var i=0;i<6;i++){
    var d = document.createElement('div');
    d.className = 'pdot';
    d.id = 'pdot'+i;
    dots.appendChild(d);
  }
  updateProgress();
}

function openVid(i){
  curStation=i;
  var s=stations[i];
  document.getElementById('stnBadge').textContent=s.num;
  document.getElementById('stnName').textContent=s.name;
  document.getElementById('stnSub').textContent=s.sub;

  // Station 7 (Training Workshop) — skip video overlay, go straight to quiz
  if(i===6){
    document.getElementById('sqOverlay').classList.add('show');
    sqCurrent=0; sqScore=0;
    document.getElementById('sqIcon').textContent='🏆';
    document.getElementById('sqTitle').textContent='Training Workshop';
    document.getElementById('sqSub').textContent='20 Questions · Overall Quiz — Test Your Knowledge!';
    document.getElementById('sqScore').classList.remove('show');
    document.getElementById('sqArea').style.display='block';
    document.getElementById('sqProg').style.width='0%';
    showNameForm();
    return;
  }

  var va=document.getElementById('vidArea');
  if(s.video){
    va.innerHTML='<iframe class="yt-frame" src="https://www.youtube.com/embed/'+s.video+'?autoplay=1" allowfullscreen></iframe>';
  } else {
    va.innerHTML='<div class="vid-placeholder"><div class="big-icon">▶️</div><p>Video coming soon</p></div>';
  }

  // Footer — show Video 2 button if exists
  var footer=document.getElementById('vidFooter');
  var vid2btn = s.video2
    ? '<button class="btn-vid2" onclick="playVid2()">▶️ Video 2</button>'
    : '';
  footer.innerHTML=
    '<button class="btn-outline" onclick="closeVid()">🗺️ Back to Map</button>'+
    vid2btn+
    '<button class="btn-gold" onclick="openSQ()">📝 Take Quiz</button>';

  document.getElementById('vidOverlay').classList.add('show');
}

function playVid2(){
  var s=stations[curStation];
  if(!s.video2) return;
  document.getElementById('vidArea').innerHTML=
    '<iframe class="yt-frame" src="https://www.youtube.com/embed/'+s.video2+'?autoplay=1" allowfullscreen></iframe>';
}

function closeVid(){
  document.getElementById('vidOverlay').classList.remove('show');
  document.getElementById('vidArea').innerHTML='';
}

function openSQ(){
  var s=stations[curStation];
  sqCurrent=0; sqScore=0;
  if(curStation===6){
    document.getElementById('sqIcon').textContent='🏆';
    document.getElementById('sqTitle').textContent='QUIZ TIME!';
    document.getElementById('sqTitle').style.color='#FFD700';
    document.getElementById('sqSub').textContent=s.quiz.length+' Questions · Overall Quiz — Test Your Knowledge!';

    document.getElementById('sqIcon').textContent=s.icon;
    document.getElementById('sqTitle').textContent=s.name;
    document.getElementById('sqTitle').style.color='#90C8FF';

  document.getElementById('sqArea').style.display='block';
  document.getElementById('sqProg').style.width='0%';
  document.getElementById('sqOverlay').classList.add('show');

}

function startOverallQuiz(){
  var name = document.getElementById('studentName').value.trim();
  var id = document.getElementById('studentId').value.trim();
  if(!name || !id){
    document.getElementById('formError').style.display='block';
    return;
  }
  window._studentName = name;
  window._studentId = id;
  showSQ();
}

function showSQ(){
  var s=stations[curStation];
  var d=s.quiz[sqCurrent];
  document.getElementById('sqProg').style.width=((sqCurrent/s.quiz.length)*100)+'%';
  var h='<div class="question-card"><div class="q-num">QUESTION '+(sqCurrent+1)+' OF '+s.quiz.length+'</div>';
  h+='<div class="q-text">'+d.q+'</div><div class="options">';
  d.opts.forEach(function(o,i){h+='<button class="opt-btn" onclick="ansSQ('+i+')">'+o+'</button>';});
  h+='</div></div>';
  document.getElementById('sqArea').innerHTML=h;
}

function ansSQ(i){
  var s=stations[curStation];
  var d=s.quiz[sqCurrent];
  var btns=document.querySelectorAll('#sqArea .opt-btn');
  btns.forEach(function(b){b.disabled=true;});
  if(i===d.ans){
    sqScore++;
    btns[i].classList.add('correct','bounce');
    playSound('correct');
    setTimeout(function(){sqCurrent++;if(sqCurrent<s.quiz.length){showSQ();}else{showSQResult();}},900);
  } else {
    btns[i].classList.add('wrong','shake');
    playSound('wrong');
    setTimeout(function(){sqCurrent++;if(sqCurrent<s.quiz.length){showSQ();}else{showSQResult();}},1200);
  }
}

function showSQResult(){
  var s=stations[curStation];
  document.getElementById('sqProg').style.width='100%';
  document.getElementById('sqArea').style.display='none';
  document.getElementById('sqScoreNum').textContent=sqScore;
  document.getElementById('sqScoreTotal').textContent='/'+s.quiz.length;
  var msg;
  if(sqScore===s.quiz.length) msg='🎉 Perfect! Excellent work!';
  else if(sqScore>=s.quiz.length-1) msg='👍 Good job! Almost perfect!';
  else if(sqScore>=1) msg='💪 Keep studying! You can do better!';
  else msg='📚 Review the content and try again!';
  document.getElementById('sqScoreMsg').textContent=msg;
  // Show student name/ID on result for station 7
  if(curStation===6 && window._studentName){
    var sub = document.querySelector('#sqScore .score-sub');
    if(sub) sub.innerHTML = '👤 <strong>'+window._studentName+'</strong> · '+window._studentId+'<br>📸 Screenshot your result!';
  }
  // Mark station as completed ONLY if perfect score (exclude Training Workshop)
  if(curStation < 6){
    if(sqScore === s.quiz.length){
      completedStations.add(curStation);
      updateProgress();
      // Clap sound if all 6 stations completed!
      if(completedStations.size === 6){
        setTimeout(function(){ playClap(); }, 400);
      }
    }
  }
  document.getElementById('sqScore').classList.add('show');
  // Hide Back to Video for Training Workshop (no video)
  var backBtn = document.getElementById('backToVideoBtn');
  if(backBtn) backBtn.style.display = stations[curStation].video ? 'block' : 'none';
}

function closeSQ(){
  document.getElementById('sqOverlay').classList.remove('show');
}

function hideLoader(){
  var loader = document.getElementById('loadingScreen');
  if(loader){
    loader.classList.add('fade-out');
    setTimeout(function(){ loader.style.display='none'; }, 650);
  }
}

// Init progress bar
initProgress();

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeVid();closeSQ();}
});
