<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T&D Learning Journey</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #0f1923;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  .header {
    width: 100%;
    background: linear-gradient(135deg, #1a3a5c, #0d2137);
    text-align: center;
    padding: 1.5rem 1rem 1.2rem;
    border-bottom: 4px solid #e8a020;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.05);
  }
  .header-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #e8a020;
    border: 1px solid rgba(232,160,32,0.4);
    padding: 0.25rem 0.9rem;
    border-radius: 20px;
    margin-bottom: 0.7rem;
  }
  .header h1 {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .header h1 span { color: #e8a020; }
  .header p {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
    margin-top: 0.4rem;
    font-weight: 400;
  }

  /* MAP */
  .map-wrapper {
    width: 100%;
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.2rem;
  }
  .map-container {
    position: relative;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .map-container img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* HOTSPOT */
  .hotspot {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
    background: none;
    border: none;
    padding: 0;
    width: 3.2%;
    aspect-ratio: 1;
  }
  .hotspot-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: clamp(0.5rem, 1.1vw, 0.85rem);
    color: #fff;
    border: 2.5px solid rgba(255,255,255,0.85);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: hotpulse 2.5s infinite;
  }
  .hotspot:hover .hotspot-inner {
    transform: scale(1.3);
    animation: none;
    box-shadow: 0 0 0 5px rgba(255,255,255,0.25), 0 4px 15px rgba(0,0,0,0.4);
  }
  @keyframes hotpulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4), 0 2px 8px rgba(0,0,0,0.3); }
    50%      { box-shadow: 0 0 0 7px rgba(255,255,255,0), 0 2px 8px rgba(0,0,0,0.3); }
  }
  .phase1 .hotspot-inner { background: rgba(30,80,160,0.92); }
  .phase2 .hotspot-inner { background: rgba(200,100,0,0.92); }
  .phase3 .hotspot-inner { background: rgba(30,120,60,0.92); }

  /* Station 1 position — tepi ENTRANCE title */
  #hs1 { left: 3.5%; top: 14%; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,15,30,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(6px);
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: #fff;
    border-radius: 22px;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.85) translateY(24px); }
    to   { opacity:1; transform:scale(1)    translateY(0); }
  }

  /* Modal top color bar */
  .modal-bar {
    height: 6px;
    border-radius: 22px 22px 0 0;
    background: var(--mc, #1e50a0);
  }

  .modal-header {
    padding: 1.4rem 1.4rem 1rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    position: relative;
    border-bottom: 1px solid #f0ede8;
  }
  .modal-num {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: var(--mc, #1e50a0);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .modal-titles h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #0f1923;
    line-height: 1.2;
  }
  .modal-titles .sub {
    font-size: 0.78rem;
    color: #6b7280;
    margin-top: 0.15rem;
  }
  .modal-phase {
    display: inline-block;
    margin-top: 0.35rem;
    font-size: 0.63rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.65rem;
    border-radius: 20px;
    background: var(--mcl, #e8f0fb);
    color: var(--mc, #1e50a0);
  }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: #f3f4f6;
    color: #6b7280;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .modal-close:hover { background: #e5e7eb; }

  .modal-body { padding: 1.4rem; }

  /* VIDEO AREA */
  .video-area {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 14px;
    overflow: hidden;
    background: #0f1923;
    margin-bottom: 1rem;
    position: relative;
  }
  .video-area iframe { width: 100%; height: 100%; border: none; }
  .video-thumb {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    cursor: pointer;
    background: linear-gradient(135deg, #1a3a5c, #0d2137);
  }
  .play-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--mc, #1e50a0);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    transition: transform 0.2s, opacity 0.2s;
  }
  .video-thumb:hover .play-btn { transform: scale(1.1); opacity: 0.9; }
  .video-thumb p { font-size: 0.8rem; color: rgba(255,255,255,0.5); }

  /* ACTION BUTTONS */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
    margin-bottom: 1.3rem;
  }
  .btn-video, .btn-quiz {
    padding: 0.75rem 1rem;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn-video:hover, .btn-quiz:hover { transform: translateY(-2px); opacity: 0.92; }
  .btn-video {
    background: var(--mc, #1e50a0);
    color: #fff;
  }
  .btn-quiz {
    background: #fff;
    color: var(--mc, #1e50a0);
    border: 2px solid var(--mc, #1e50a0);
  }

  /* INFO */
  .info-section { margin-bottom: 1.1rem; }
  .info-section h4 {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mc, #1e50a0);
    margin-bottom: 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--mcl, #e8f0fb);
  }
  .info-list { list-style: none; }
  .info-list li {
    font-size: 0.83rem;
    color: #374151;
    line-height: 1.55;
    padding: 0.35rem 0 0.35rem 1.1rem;
    position: relative;
  }
  .info-list li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--mc, #1e50a0);
    font-size: 0.68rem;
    top: 0.42rem;
  }

  /* QUIZ PANEL */
  .quiz-panel {
    display: none;
    background: #f8f9ff;
    border-radius: 14px;
    padding: 1.2rem;
    margin-bottom: 1.2rem;
    border: 1.5px solid var(--mcl, #e8f0fb);
  }
  .quiz-panel.active { display: block; }
  .quiz-panel h4 {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--mc, #1e50a0);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }
  .quiz-q {
    font-size: 0.85rem;
    font-weight: 600;
    color: #1a2e4a;
    margin-bottom: 0.6rem;
    line-height: 1.4;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 0.4rem; }
  .quiz-opt {
    padding: 0.6rem 0.9rem;
    border-radius: 10px;
    border: 1.5px solid #e5e7eb;
    background: #fff;
    font-size: 0.8rem;
    color: #374151;
    cursor: pointer;
    text-align: left;
    font-family: 'Poppins', sans-serif;
    transition: border-color 0.15s, background 0.15s;
  }
  .quiz-opt:hover { border-color: var(--mc, #1e50a0); background: var(--mcl, #e8f0fb); }
  .quiz-opt.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
  .quiz-opt.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
  .quiz-feedback {
    margin-top: 0.7rem;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.5rem 0.8rem;
    border-radius: 8px;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: #d1fae5; color: #065f46; }
  .quiz-feedback.wrong { background: #fee2e2; color: #991b1b; }

  .footer {
    width: 100%;
    text-align: center;
    padding: 1rem;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.25);
    margin-top: auto;
  }
  .footer span { color: #e8a020; }

  @media (max-width: 480px) {
    .modal { border-radius: 18px 18px 0 0; max-height: 85vh; }
    .modal-overlay { align-items: flex-end; padding: 0; }
    .action-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-tag">Training & Development</div>
  <h1>T&D <span>Learning</span> Journey</h1>
  <p>Click on any station to explore · A Continuous Cycle for Performance Improvement</p>
</div>

<div class="map-wrapper">
  <div class="map-container">
    <img src="map.jpg" alt="T&D Learning Journey Map" id="mapImg">

    <!-- Station 1 only for now -->
    <button class="hotspot phase1" id="hs1" onclick="openModal('s1')">
      <div class="hotspot-inner">1</div>
    </button>

  </div>
</div>

<div class="footer"><span>Training & Development</span> · Interactive Learning Map · Saito University College</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal" id="modalBox">
    <div class="modal-bar" id="mBar"></div>
    <div class="modal-header">
      <div class="modal-num" id="mNum">1</div>
      <div class="modal-titles">
        <h2 id="mTitle"></h2>
        <div class="sub" id="mSub"></div>
        <span class="modal-phase" id="mPhase"></span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
const stations = {
  s1: {
    num: '1',
    icon: '🚪',
    title: 'Entrance',
    sub: 'Introduction to Training & Development',
    phase: 'Station 1 · Phase 1 — Before Training',
    color: '#1e50a0',
    colorLight: '#e8f0fb',
    video: null, // YouTube ID goes here
    quiz: {
      q: 'What does T&D stand for in Human Resource Management?',
      options: [
        'Talent & Discipline',
        'Training & Development',
        'Tasks & Duties',
        'Teams & Departments'
      ],
      answer: 1
    },
    info: `
      <div class="info-section">
        <h4>What is Training & Development?</h4>
        <ul class="info-list">
          <li>T&D refers to systematic activities to improve employee knowledge, skills & attitudes</li>
          <li>A planned process within Human Resource Management (HRM)</li>
          <li>Helps employees perform current jobs better & prepares them for future roles</li>
        </ul>
      </div>
      <div class="info-section">
        <h4>Why It Matters in Organizations</h4>
        <ul class="info-list">
          <li>Improves individual and organizational performance</li>
          <li>Reduces errors, accidents, and employee turnover</li>
          <li>Increases motivation, engagement, and job satisfaction</li>
          <li>Helps organizations stay competitive and adapt to change</li>
        </ul>
      </div>`
  }
};

let currentQuiz = null;

function openModal(key) {
  const r = stations[key];
  const box = document.getElementById('modalBox');

  // Set colors
  box.style.setProperty('--mc', r.color);
  box.style.setProperty('--mcl', r.colorLight);
  document.getElementById('mBar').style.background = r.color;
  document.getElementById('mNum').style.background = r.color;
  document.getElementById('mNum').textContent = r.num;
  document.getElementById('mTitle').textContent = r.title;
  document.getElementById('mSub').textContent = r.sub;
  const ph = document.getElementById('mPhase');
  ph.textContent = r.phase;
  ph.style.background = r.colorLight;
  ph.style.color = r.color;

  // Build body
  const videoHTML = r.video
    ? `<div class="video-area"><iframe src="https://www.youtube.com/embed/${r.video}" allowfullscreen></iframe></div>`
    : `<div class="video-area">
        <div class="video-thumb" onclick="this.innerHTML='<p style=\\'color:rgba(255,255,255,0.4);font-size:.8rem\\'>No video assigned yet</p>'">
          <div class="play-btn">▶</div>
          <p>Watch Video</p>
        </div>
       </div>`;

  const quizHTML = `
    <div class="quiz-panel" id="quizPanel">
      <h4>📝 Quick Quiz</h4>
      <div class="quiz-q">${r.quiz.q}</div>
      <div class="quiz-options">
        ${r.quiz.options.map((o,i) => `<button class="quiz-opt" onclick="checkAnswer(this,${i},${r.quiz.answer})">${o}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
    </div>`;

  const actionHTML = `
    <div class="action-row">
      <button class="btn-video" style="background:${r.color}" onclick="playVideo('${r.video}')">▶ &nbsp;Watch Video</button>
      <button class="btn-quiz" style="color:${r.color};border-color:${r.color}" onclick="toggleQuiz()">📝 &nbsp;Take Quiz</button>
    </div>`;

  document.getElementById('mBody').innerHTML = videoHTML + actionHTML + quizHTML + r.info;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function playVideo(id) {
  const area = document.querySelector('.video-area');
  if (!id) { area.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,0.4);font-size:.82rem">No video assigned yet</div>'; return; }
  area.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
}

function toggleQuiz() {
  const panel = document.getElementById('quizPanel');
  panel.classList.toggle('active');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function checkAnswer(btn, selected, correct) {
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.disabled = true);
  const fb = document.getElementById('quizFeedback');
  if (selected === correct) {
    btn.classList.add('correct');
    fb.textContent = '✅ Correct! Well done!';
    fb.className = 'quiz-feedback show correct';
  } else {
    btn.classList.add('wrong');
    opts[correct].classList.add('correct');
    fb.textContent = '❌ Not quite. The correct answer is highlighted.';
    fb.className = 'quiz-feedback show wrong';
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}
function closeOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
